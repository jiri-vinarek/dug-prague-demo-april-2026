# The main job for dug_prague_april_2026.
resources:
  jobs:
    dug_prague_april_2026_pid_stops_job:
      name: dug_prague_april_2026_pid_stops_job

      tasks:
        - task_key: fetch_stops
          notebook_task:
            notebook_path: ../src/tasks/01_fetch_stops_task.ipynb
        - task_key: ingest_stops
          depends_on:
            - task_key: fetch_stops
          notebook_task:
            notebook_path: ../src/tasks/02_ingest_stops_task.ipynb
        - task_key: clean_stops
          depends_on:
            - task_key: ingest_stops
          notebook_task:
            notebook_path: ../src/tasks/03_clean_stops_task.ipynb

      parameters:
        - name: raw_stops_volume
          default: /Volumes/playground/dug_prague_april_2026/pid_stops
        - name: bronze_stops_table
          default: playground.dug_prague_april_2026.stops_bronze
        - name: silver_stops_scd2_table
          default: playground.dug_prague_april_2026.stops_silver_scd2
      
      performance_target: STANDARD